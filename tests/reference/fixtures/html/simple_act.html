    <title>National Communications Authority Act, 2008</title>
  </head>
  <body>
    <main>
      <h1>National Communications Authority Act, 2008</h1>
      <section id="sec_1" class="section" data-number="1">
        <h2>Section 1. Establishment of the Authority</h2>
        <p>There is established by this Act the National Communications Authority.</p>
      </section>
      <section id="sec_2" class="section" data-number="2">
        <h2>Section 2. Object of the Authority</h2>
        <p>The object of the Authority is to regulate communications.</p>
      </section>
    </main>
